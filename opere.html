<style>
@font-face {
  font-family: "Laubag";
  src: url("./fonts/Laubag.woff2") format("woff2"),

  font-weight: normal; font-style: normal; font-display: swap;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --oro: #b08840; --oro-luce: #d4aa5a; --oro-pallido: #f0dea0;
  --bruno: #2e1f0e; --bruno-medio: #4a3520; --bruno-chiaro: #7a5c3a;
  --crema: #faf6ef; --crema-scura: #ede4d4; --pergamena: #f5edd8;
  --testo: #2a1c0a; --testo-morbido: #5c4530;
}
html { scroll-behavior: smooth; }
body { font-family: "Cormorant Garamond", Georgia, serif; background: var(--crema); color: var(--testo); overflow-x: hidden; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(46,31,14,0.97);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(176,136,64,0.2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem; height: 62px;
}
.nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
.nav-logo img { height: 42px; width: auto; filter: drop-shadow(0 1px 6px rgba(0,0,0,0.35)); transition: opacity 0.2s; }
.nav-logo:hover img { opacity: 0.85; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-family: "Cinzel", serif; font-size: 0.6rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: rgba(255,255,255,0.55);
  text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.attivo { color: var(--oro-luce); }
.nav-links a.attivo { border-bottom: 1px solid var(--oro); padding-bottom: 2px; }
@media (max-width: 600px) {
  nav { padding: 0 1.2rem; }
  .nav-links { gap: 1.4rem; }
  .nav-links a { font-size: 0.55rem; letter-spacing: 0.2em; }
}

/* ── BANDA ORO ── */
.banda-oro { height: 3px; background: linear-gradient(90deg, var(--bruno) 0%, var(--oro) 25%, var(--oro-pallido) 50%, var(--oro) 75%, var(--bruno) 100%); }

/* ── SEPARATORE SEZIONE ── */
.sep-sezione {
  display: flex; align-items: center; gap: 1.4rem;
  padding: 4rem 3rem 2rem;
  max-width: 1400px; margin: 0 auto;
}
.sep-sezione .linea { flex: 1; height: 1px; background: rgba(176,136,64,0.25); }
.sep-sezione .etichetta {
  font-family: "Cinzel", serif; font-size: 0.62rem; letter-spacing: 0.5em;
  text-transform: uppercase; color: var(--oro); white-space: nowrap;
}

/* ── MASONRY ── */
.masonry-wrap {
  padding: 0 2rem 5rem;
  max-width: 1400px; margin: 0 auto;
}
.masonry {
  columns: 4 280px;
  column-gap: 10px;
}
.masonry-item {
  break-inside: avoid;
  margin-bottom: 10px;
  overflow: hidden;
  position: relative;
  cursor: zoom-in;
}
.masonry-item img {
  display: block; width: 100%;
  transition: transform 0.6s ease, filter 0.4s ease;
  filter: brightness(0.97);
}
.masonry-item:hover img {
  transform: scale(1.03);
  filter: brightness(1.04);
}

/* placeholder when no image */
.placeholder {
  display: block; width: 100%;
  background: var(--crema-scura);
  position: relative;
}
.placeholder::after {
  content: "";
  position: absolute; inset: 8px;
  border: 1px solid rgba(176,136,64,0.3);
  pointer-events: none;
}

/* ── DIVISORE TRA SEZIONI ── */
.divisore {
  border: none;
  border-top: 1px solid rgba(176,136,64,0.18);
  margin: 1rem 3rem 0;
  max-width: 1400px;
}

/* ── FOOTER ── */
footer {
  background: var(--bruno); padding: 3.5rem 2rem 2rem;
  text-align: center; border-top: 1px solid rgba(176,136,64,0.2);
  position: relative; overflow: hidden;
}
footer::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(176,136,64,0.07) 0%, transparent 70%);
}
.footer-inner { position: relative; z-index: 1; }
.footer-logo { height: 52px; width: auto; opacity: 0.9; }
.linea-oro { width: 60px; height: 1px; background: var(--oro); margin: 1.6rem auto; }
.footer-contatti { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem 1rem; margin-bottom: 1.8rem; }
.footer-link { font-family: "Cormorant Garamond", serif; font-size: 1rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; font-style: italic; }
.footer-link:hover { color: var(--oro-luce); }
.footer-sep { color: rgba(176,136,64,0.35); font-size: 0.9rem; }
.footer-copy { font-family: "Cinzel", serif; font-size: 0.55rem; letter-spacing: 0.35em; color: rgba(255,255,255,0.2); text-transform: uppercase; margin-top: 1rem; }
@media (max-width: 600px) {
  .footer-sep { display: none; }
  .footer-contatti { flex-direction: column; gap: 0.5rem; }
}

/* ── WA ── */
#wa-widget {

#wa-widget:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(37,211,102,0.6); }

/* ── LIGHTBOX ── */
#lb-overlay {

  background: rgba(8,4,1,0.96);
  justify-content: center; align-items: center; padding: 1rem;

#lb-overlay.open { display: flex; }
#lb-box { position: relative; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; max-width: 92vw; max-height: 92vh; }
#lb-overlay img { max-width: 88vw; max-height: 82vh; object-fit: contain; display: block; box-shadow: 0 0 60px rgba(176,136,64,0.2); }
#lb-close {

}
#lb-close:hover { background: rgba(176,136,64,0.1); }
</style>

<script>
// Lightbox
(function() {
  var overlay, lbImg, lbClose;
  function apri(src) { lbImg.src = src; overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
  function chiudi() { overlay.classList.remove("open"); lbImg.src = ""; document.body.style.overflow = ""; }

  document.addEventListener("DOMContentLoaded", function() {
    overlay  = document.getElementById("lb-overlay");
    lbImg    = document.getElementById("lb-img");
    lbClose  = document.getElementById("lb-close");

    // attach to real images only (skip placeholders)
    document.querySelectorAll(".masonry-item img").forEach(function(img) {
      img.parentElement.addEventListener("click", function() { apri(img.src); });
    });

    lbClose.addEventListener("click", chiudi);
    overlay.addEventListener("click", function(e) { if (e.target === overlay) chiudi(); });
    document.addEventListener("keydown", function(e) { if (e.key === "Escape") chiudi(); });
  });
})();
</script>

<!-- LIGHTBOX -->
<div id="lb-overlay">
  <div id="lb-box">
    <button id="lb-close">✕ Chiudi</button>
    <img id="lb-img" src="" alt="Opera in dettaglio">
  </div>
</div>

<script>
// Lightbox
(function() {
  var overlay, lbImg, lbClose;
  function apri(src) { lbImg.src = src; overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
  function chiudi() { overlay.classList.remove("open"); lbImg.src = ""; document.body.style.overflow = ""; }

  document.addEventListener("DOMContentLoaded", function() {
    overlay  = document.getElementById("lb-overlay");
    lbImg    = document.getElementById("lb-img");
    lbClose  = document.getElementById("lb-close");

    // attach to real images only (skip placeholders)
    document.querySelectorAll(".masonry-item img").forEach(function(img) {
      img.parentElement.addEventListener("click", function() { apri(img.src); });
    });

    lbClose.addEventListener("click", chiudi);
    overlay.addEventListener("click", function(e) { if (e.target === overlay) chiudi(); });
    document.addEventListener("keydown", function(e) { if (e.key === "Escape") chiudi(); });
  });
})();
</script>
